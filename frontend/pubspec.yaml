name: frontend
description: "A new Flutter project."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  http: ^1.6.0
  dart_mappable: ^4.6.1
  shared_preferences: ^2.2.2
  go_router: ^17.1.0
  provider: ^6.1.5+1
  flutter_riverpod: ^3.3.1
  riverpod_annotation: ^4.0.2
  intl: ^0.20.2
  font_awesome_flutter: ^11.0.0
  collection: ^1.19.1
  flutter_local_notifications: ^17.0.0
  flutter_native_splash: ^2.3.9
  pinput: ^6.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.11.1
  dart_mappable_builder: ^4.6.4
  riverpod_generator: ^4.0.3
  flutter_launcher_icons: ^0.13.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/SafeHands-Logo_Final.png

flutter_native_splash:
  color: "#ffffff"
  image: assets/images/SafeHands-Logo_Final.png
  android_12:
    color: "#ffffff"
    image: assets/images/SafeHands-Logo_Final.png

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/SafeHands-Logo_Final.png"
  adaptive_icon_background: "#ffffff"
  adaptive_icon_foreground: "assets/images/SafeHands-Logo_Final.png"