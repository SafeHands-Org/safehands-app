services:
  backend:
    build: .
    ports:
      - "${APP_PORT}:${APP_PORT}"
      - "4983:4983"
    env_file:
      - ./.env
    depends_on:
      - db
    volumes:
      - ./:/safehands-app
      - /safehands-app/node_modules
  db:
    image: postgres:17
    container_name: postgres_container
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "${DB_PORT}:${DB_PORT}"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $POSTGRES_USER -d $POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data: